# Cilium operator config
operator:
  # replicas: 1  # Uncomment this if you only have one node
  # Roll out cilium-operator pods automatically when configmap is updated.
  rollOutPods: true

  # Install operator on master node
  nodeSelector:
    node-role.kubernetes.io/control-plane: "true"

  # Enable prometheus integration for cilium-operator
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
  # Enable Grafana dashboards for cilium-operator
  dashboards:
    enabled: true
    annotations:
      grafana_folder: Cilium

---
# Cilium CNI Config
---

# Roll out cilium agent pods automatically when ConfigMap is updated.
rollOutCiliumPods: true

# Enables Internet access to pods
bpf:
  masquerade: true

# Enables IPv4 and IPv6
ipv4:
  enabled: true
ipv6:
  enabled: true

# K8s API service
k8sServiceHost: 127.0.0.1
k8sServicePort: 6444

# Replace Kube-proxy
kubeProxyReplacement: true
kubeProxyReplacementHealthzBindAddr: 0.0.0.0:10256

# -- Configure IP Address Management mode.
# ref: https://docs.cilium.io/en/stable/network/concepts/ipam/
ipam:
  operator:
    clusterPoolIPv4PodCIDRList: "10.42.0.0/16"
    # https://github.com/cilium/cilium/issues/20756
    clusterPoolIPv6PodCIDRList: "fd01::/48"
    clusterPoolIPv6MaskSize: 64

# Configure L2 announcements (LB-IPAM configuration)
l2announcements:
  enabled: true
l2podAnnouncements:
  interface: "eno1"
bgpControlPlane:
  enabled: true
externalIPs:
  enabled: true

# Setting Interface device for Cilium
devices: "eno1"

# Configures Ingress Controller
ingressController:
  default: true
  enabled: true
  enforceHttps: false

# Increase the k8s api client rate limit to avoid being limited due to increased API usage 
k8sClientRateLimit:
  qps: 50
  burst: 200

---
# Prometheus Config
---
# Enable Prometheus integration for cilium-agent
prometheus:
  enabled: true
  serviceMonitor:
    enabled: true
    # scrape interval
    interval: "10s"
    # -- Relabeling configs for the ServiceMonitor hubble
    relabelings:
      - action: replace
        sourceLabels:
          - __meta_kubernetes_pod_node_name
        targetLabel: node
        replacement: ${1}
    trustCRDsExist: true
# Enable Grafana dashboards for cilium-agent
# grafana can import dashboards based on the label and value
# ref: https://github.com/grafana/helm-charts/tree/main/charts/grafana#sidecar-for-dashboards
dashboards:
  enabled: true
  annotations:
    grafana_folder: Cilium


---
# Hubble UI Config
---
hubble:
  enabled: true
  # Enable Monitoring
  metrics:
    enabled:
      - dns:query
      - drop
      - tcp
      - flow
      - port-distribution
      - icmp
      - http
    serviceMonitor:
      enabled: true
      # scrape interval
      interval: "10s"
      # -- Relabeling configs for the ServiceMonitor hubble
      relabelings:
        - action: replace
          sourceLabels:
            - __meta_kubernetes_pod_node_name
          targetLabel: node
          replacement: ${1}
    # Grafana Dashboards
    dashboards:
      enabled: true
      annotations:
        grafana_folder: Cilium
  relay:
    enabled: true
    rollOutPods: true
    # Enable Prometheus for hubble-relay
    prometheus:
      enabled: true
      serviceMonitor:
        enabled: true
  ui:
    enabled: true
    rollOutPods: true
    # Enable Ingress
    ingress:
      enabled: true
      annotations:
        # Enable external authentication using Oauth2-proxy
        nginx.ingress.kubernetes.io/auth-signin: https://oauth2-proxy.homelab.kbushby.com/oauth2/start?rd=https://$host$request_uri
        nginx.ingress.kubernetes.io/auth-url: http://oauth2-proxy.oauth2-proxy.svc.cluster.local/oauth2/auth
        nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
        nginx.ingress.kubernetes.io/auth-response-headers: Authorization

        # Enable cert-manager to create automatically the SSL certificate and store in Secret
        # Possible Cluster-Issuer values:
        #   * 'letsencrypt-issuer' (valid TLS certificate using IONOS API)
        #   * 'ca-issuer' (CA-signed certificate, not valid)
        external-dns.alpha.kubernetes.io/hostname: hubble.homelab.kbushby.com
        cert-manager.io/cluster-issuer: cloudflare-ca-issuer
        cert-manager.io/common-name: hubble.homelab.kbushby.com
      className: nginx
      hosts: ["hubble.homelab.kbushby.com"]
      tls:
        - hosts:
          - hubble.homelab.kbushby.com
          secretName: hubble-tls

