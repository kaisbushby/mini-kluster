provider:
  name: rfc2136

#rfc2136:
#  host: "192.168.20.2"
#  port: 53
#  zone: "homelab.kbushby.com"
#  tsigAxfr: true
#  tsigKeyname: "externaldns-key"
#  tsigSecretAlg: "hmac-sha256"
#  tsigSecret:
#    valueFrom:
#      secretKeyRef:
#        name: external-dns-kube-pi-secret
#        key: ddns-key

#extraArgs:
#  - --rfc2136-host=192.168.20.2  # Technitium DNS IP
#  - --rfc2136-port=53
#  - --rfc2136-zone=homelab.kbushby.com       # DNS Zone
#  - --rfc2136-tsig-secret-alg=hmac-sha256
#  - --rfc2136-tsig-keyname=externaldns-key # TSIG Key Name
#  - --rfc2136-tsig-axfr
#  - --log-level=debug
env:
  - name: EXTERNAL_DNS_RFC2136_HOST
    value: "192.168.20.2"
  - name: EXTERNAL_DNS_RFC2136_PORT
    value: "53"
  - name: EXTERNAL_DNS_RFC2136_ZONE
    value: "kbushby.com"
  - name: EXTERNAL_DNS_RFC2136_TSIG_AXFR
    value: "true"
  - name: EXTERNAL_DNS_RFC2136_TSIG_KEYNAME
    value: "externaldns-key"
  - name: EXTERNAL_DNS_RFC2136_TSIG_SECRET_ALG
    value: "hmac-sha256"
  - name: EXTERNAL_DNS_RFC2136_TSIG_SECRET
    valueFrom:
      secretKeyRef:
#        name: tsig-key
#        key: key
        name: external-dns-kube-pi-secret
        key: ddns-key

policy: sync
registry: txt
txtOwnerId: k8s
txtPrefix: external-dns-
sources:
  - crd
  - service
  - ingress

domainFilters:
  - homelab.kbushby.com

metrics:
  enabled: true
  serviceMonitor:
    enabled: true

# helm upgrade external-dns external-dns/external-dns -n external-dns -f external-dns-values.yaml --history-max=3
