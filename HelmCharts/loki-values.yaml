# Q: What is Loki?
# A: Loki is a log aggregation system, which is also capable of storing logs into S3/PVC
# Currently used to store logs for the Grafana Dashboard

deploymentMode: SimpleScalable

loki:
  auth_enabled: false

  compactor:
    compaction_interval: 10m
    delete_request_store: s3
    retention_delete_delay: 2h
    retention_enabled: true
    working_directory: /var/loki/retention

  # S3 backend storage configuration
  storage:
    bucketNames:
      chunks: k3s-loki
      ruler: k3s-loki
    type: s3
    s3:
      endpoint: rook-ceph-rgw-ceph-objectstore.rook-ceph.svc.cluster.local
      region: ceph-objectstore
      accessKeyId: VCHB14NSPY09MP38RNBT
      secretAccessKey: t2xJy0c6ICj3DX6az4kVUBRRJoACepHKGfVrlDw3
      s3ForcePathStyle: true
      insecure: true
      http_config:
        idle_conn_timeout: 90s
        response_header_timeout: 0s
        insecure_skip_verify: true
  # Storage Schema
  schemaConfig:
    configs:
    - from: 2024-04-01
      store: tsdb
      index:
        prefix: loki_index_
        period: 24h
      object_store: s3
      schema: v13

# Configuration for the write
write:
  # Number of replica pods for the write
  replicas: 3
  persistence:
    # -- Size of persistent disk
    size: 10Gi
    # -- Storage class to be used.
    storageClass: rook-ceph-block

# Configuration for the read
read:
  # Number of replica pods for the read
  replicas: 3
  persistence:
    # -- Size of persistent disk
    size: 10Gi
    # -- Storage class to be used.
    storageClass: rook-ceph-block

# Configuration for the backend
backend:
  # Number of replica pods for the backend
  replicas: 3
  persistence:
    # -- Size of persistent disk
    size: 10Gi
    # -- Storage class to be used.
    storageClass: rook-ceph-block

# Configuration for the gateway
gateway:
  # -- Specifies whether the gateway should be enabled
  enabled: true
  # -- Number of replicas for the gateway
  replicas: 1

# Disable mino installation
minio:
  enabled: false

# Disable self-monitoring
lokiCanary:
  enabled: false

# Disable helm-test
test:
  enabled: false

resultsCache:
  resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 1586Mi

  # -- Amount of resources allocated to chunks-cache for object storage
  allocatedMemory: 1024
  allocatedCPU: 400m


chunksCache:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 2048Mi

  # -- Amount of resources allocated to chunks-cache for object storage
  allocatedMemory: 1536
  allocatedCPU: 400m

