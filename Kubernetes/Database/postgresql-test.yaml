apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgresql-testdb
  namespace: databases
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.3-4
  storage:
    size: 1Gi
    storageClass: rook-ceph-block
  monitoring:
    enablePodMonitor: true
  bootstrap:
    initdb:
      database: mydatabase
      # Secret with the password will be auto generated
      owner: testuser
