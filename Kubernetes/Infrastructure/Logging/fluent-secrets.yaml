apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: fluent-tls
  namespace: fluent
spec:
  # Secret names are always required.
  secretName: fluent-tls
  duration: 2160h # 90d
  renewBefore: 360h # 15d
  commonName: fluent.homelab.kbushby.com
  isCA: false
  privateKey:
    algorithm: ECDSA
    size: 256
  usages:
    - server auth
    - client auth
  dnsNames:
    - fluent.homelab.kbushby.com
  isCA: false
  # ClusterIssuer: ca-issuer.
  issuerRef:
    name: cloudflare-ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: v1
kind: Secret
metadata:
  name: fluent-env-secrets
  namespace: fluent
type: Opaque
data:
  fluent-shared-key: "U3RydWdnbGluZ1dpdGhUaGlzCg==" # echo "StrugglingWithThis" | base64
---
apiVersion: v1
kind: Secret
metadata:
  name: fluent-secrets
  namespace: fluent
type: Opaque
data:
  es-username: "Zmx1ZW50ZA==" #fluentd
  es-password: "eTE4NkxINFdxSFlP" # y186LH4WqHYO

