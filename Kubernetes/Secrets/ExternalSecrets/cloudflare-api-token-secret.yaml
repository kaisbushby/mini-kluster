# vault kv put secret/cloudflare api-token="<TOKEN>"

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vault-cloudflare-token
  namespace: cert-manager
spec:
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    # name of the generated secret
    name: cloudflare-api-token-secret
  data:

  - secretKey: api-token # Name of the element in the generated secret
    remoteRef:
      key: cloudflare  # The path of the secret, relative from the secrets path
      property: api-token  # name of the attribute to access

