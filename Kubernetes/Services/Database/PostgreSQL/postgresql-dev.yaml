apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgresql-db
  namespace: database-dev
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.3-4
  storage:
    size: 10Gi
    storageClass: rook-ceph-block
  monitoring:
    enablePodMonitor: true
  bootstrap:
    initdb:
      database: mydatabase
      # Secret with the password will be auto generated
      owner: testuser
      # kubectl get secret -n database-dev postgresql-db-app -o=jsonpath='{.data.password}' | base64 --decode; echo
  postgresql:
    pg_hba:
      - hostssl all all 0.0.0.0/0 scram-sha-256
      - host all all 0.0.0.0/0 scram-sha-256
  managed:
    services:
      additional:
      - selectorType: rw
        serviceTemplate:
          metadata:
            name: postgresql-db-rw-lb
            annotations:
              external-dns.alpha.kubernetes.io/hostname: postgresql-db-rw.dev.homelab.kbushby.com
          spec:
            type: LoadBalancer

