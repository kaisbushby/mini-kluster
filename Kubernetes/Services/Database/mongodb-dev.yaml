# https://oneuptime.com/blog/post/2026-01-17-helm-mongodb-operator-deployment/view

apiVersion: mongodbcommunity.mongodb.com/v1
kind: MongoDBCommunity
metadata:
  name: mongodb-dev
  namespace: mongodb
spec:
  members: 2
  type: ReplicaSet
  version: "8.0.26"
  security:
    # tls:
    #   enabled: true
    #   certificateKeySecretRef:
    #     name: mongodb-tls-cert
    #   caConfigMapRef:
    #     name: mongodb-ca-cert
    authentication:
      modes: ["SCRAM"]
  users:
    - name: admin
      db: admin
      passwordSecretRef: # a reference to the secret that will be used to generate the user's password
        name: mongodb-dev-admin-user
      roles:
        - name: clusterAdmin
          db: admin
        - name: userAdminAnyDatabase
          db: admin
      scramCredentialsSecretName: mongodb-admin-scram
  additionalMongodConfig:
    storage.wiredTiger.engineConfig.journalCompressor: zlib
    net.compression.compressors: snappy,zstd,zlib
  statefulSet:
    spec:
      # selector:
      #   matchLabels:
      #     app: mongodb
      #     environment: dev
      template:
        # metadata:
        #   labels:
        #     app: mongodb
        #     environment: dev
        spec:
          containers:
            - name: mongod
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 1
                  memory: 2Gi
      volumeClaimTemplates:
        - metadata:
            name: data-volume
          spec:
            storageClassName: rook-ceph-block
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 10Gi
        - metadata:
            name: logs-volume
          spec:
            accessModes: ["ReadWriteOnce"]
            storageClassName: rook-ceph-block
            resources:
              requests:
                storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-dev-service
  namespace: mongodb
  labels:
    app: mongodb
  annotations:
    external-dns.alpha.kubernetes.io/hostname: mongodb.dev.homelab.kbushby.com
spec:
  type: LoadBalancer
  selector:
    app: mongodb-dev-svc
  ports:
    - name: mongodb
      protocol: TCP
      port: 27017       # Port exposed inside the cluster
      targetPort: 27017 # Port the MongoDB container listens on
---
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-dev-admin-user
  namespace: mongodb
type: Opaque
stringData:
  password: s1cret0