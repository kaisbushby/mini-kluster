apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: demo-topic
  namespace: kafka
  labels:
    # Link this topic to the cluster
    strimzi.io/cluster: dev-cluster
spec:
  partitions: 6
  replicas: 3
  config:
    retention.ms: 604800000        # 7 days
    cleanup.policy: delete
    max.message.bytes: 1048576     # 1 MB
    min.insync.replicas: 2